<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ラクガキバトラーズ（試作版）</title>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
:root{
  --ink:#2b2b2b; --paper:#fdf8ec; --accent:#e74c3c; --blue:#2980d9;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{
  margin:0; font-family:'Yusei Magic','Hiragino Maru Gothic ProN',sans-serif;
  color:var(--ink);
  background:var(--paper);
  background-image:linear-gradient(rgba(41,128,217,.07) 1px, transparent 1px);
  background-size:100% 28px;
  min-height:100vh; display:flex; justify-content:center;
}
#app{width:100%; max-width:560px; padding:12px;}
.screen{display:none;}
.screen.active{display:block; animation:pop .25s ease;}
@keyframes pop{from{transform:scale(.97); opacity:0} to{transform:scale(1); opacity:1}}
h1{text-align:center; font-size:32px; margin:24px 0 4px; letter-spacing:2px; text-shadow:2px 2px 0 #f5d90a;}
.langrow{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;}
.langbtn{font-size:13px; padding:6px 12px;}
.langbtn.sel{background:#f5d90a;}
h2{text-align:center; font-size:22px; margin:10px 0 2px;}
.subtitle{text-align:center; font-size:13px; opacity:.7; margin-bottom:16px;}
.wobble{
  border:3px solid var(--ink);
  border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;
  background:#fff; padding:14px; margin-bottom:12px;
}
button{
  font-family:inherit; font-size:16px; color:var(--ink);
  background:#fff; border:3px solid var(--ink); padding:10px 18px;
  border-radius:255px 15px 225px 15px / 15px 225px 15px 255px;
  cursor:pointer; transition:transform .08s;
}
button:active{transform:scale(.95);}
button:disabled{opacity:.4; pointer-events:none;}
button.primary{background:#f5d90a; font-size:19px; padding:13px 26px;}
.center{text-align:center;}
.badge{display:inline-block; background:var(--ink); color:#fff; border-radius:10px; padding:2px 10px; font-size:13px;}
/* ===== deck ===== */
#deck-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.slot{
  border:3px solid var(--ink); border-radius:14px; background:#fff; padding:8px; text-align:center;
  cursor:pointer; position:relative;
}
.slot.done{cursor:pointer;}
.slot .editmark{position:absolute; bottom:34px; right:6px; font-size:14px; background:#fff; border:2px solid var(--ink); border-radius:8px; padding:0 4px; z-index:1;}
.slot img{width:100%; aspect-ratio:1; background:#fff; border:2px dashed #ccc; border-radius:8px; display:block;}
.slot .empty-box{
  width:100%; aspect-ratio:1; border:2px dashed #bbb; border-radius:8px;
  display:flex; align-items:center; justify-content:center; font-size:30px; color:#bbb;
}
.slot .tier{position:absolute; top:4px; left:6px; z-index:1;}
.slot .ttype{position:absolute; top:4px; right:6px; font-size:22px; z-index:1;}
.slot .stats{font-size:11px; margin-top:4px; line-height:1.5;}
/* ===== draw ===== */
#draw-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:4px;}
#draw-msg{font-size:13px; min-height:20px; margin-bottom:6px;}
#timer-row{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
#timer-wrap{flex:1; height:14px; border:2px solid var(--ink); border-radius:8px; overflow:hidden; background:#fff;}
#timer-bar{height:100%; width:100%; background:linear-gradient(90deg,#27ae60,#f5d90a);}
#time-text{font-size:15px; min-width:52px; text-align:right;}
#paint{
  width:100%; touch-action:none; display:block; background:#fff;
  border:3px solid var(--ink);
  border-radius:15px 255px 15px 225px / 225px 15px 255px 15px;
  cursor:crosshair;
}
#tools{display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; align-items:center;}
.tool{width:44px; height:44px; padding:0; font-size:18px; display:flex; align-items:center; justify-content:center;}
.tool.sel{background:#f5d90a; transform:scale(1.08);}
#palette{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
.swatch{
  width:34px; height:34px; border-radius:50% 40% 55% 45%; border:3px solid var(--ink); cursor:pointer;
}
.swatch.sel{outline:3px dashed var(--ink); outline-offset:2px;}
/* ===== battle ===== */
#battle-top{display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px;}
#arena{display:flex; gap:10px; margin-bottom:6px;}
.fighter{flex:1; text-align:center; padding:6px; position:relative; margin-bottom:0;}
.fighter canvas{width:100%; aspect-ratio:1; display:block; background:#fff;}
.fighter .ftype{position:absolute; top:2px; right:6px; font-size:24px; z-index:1;}
.fname{font-size:13px; margin:4px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.fcond{font-size:11px; min-height:15px; margin:0 0 2px; color:#8e44ad;}
.hpbar{height:12px; border:2px solid var(--ink); border-radius:6px; background:#fff; overflow:hidden;}
.hpfill{height:100%; background:#27ae60; width:100%; transition:width .4s;}
.hpnum{font-size:12px;}
.bench{display:flex; gap:4px; margin-bottom:6px; justify-content:center;}
.bench .bm{
  width:40px; height:40px; border:2px solid var(--ink); border-radius:8px; background:#fff;
  position:relative; overflow:hidden;
}
.bench .bm img{width:100%; height:100%;}
.bench .bm.active{outline:3px solid #f5d90a;}
.bench .bm.ko{opacity:.3;}
.bench .bm.ko::after{content:'✖'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:20px;}
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-6px,2px) rotate(-2deg)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,1px) rotate(2deg)}80%{transform:translate(3px,-1px)}}
#hint{min-height:20px; font-size:13px; text-align:center; margin-bottom:6px; opacity:.85;}
#actions{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;}
#actions button{padding:8px 4px; font-size:13px; line-height:1.25;}
#actions small{display:block; font-size:9px; opacity:.65;}
#switch-row{margin-bottom:8px;}
#switch-row button{width:100%; padding:8px 4px; font-size:13px;}
#blog{
  height:96px; overflow-y:auto; font-size:13px; line-height:1.6;
  background:#fff; border:3px solid var(--ink); border-radius:12px; padding:8px 10px;
}
#blog div{border-bottom:1px dashed #ccc;}
/* ===== overlays ===== */
.ovl{
  position:fixed; inset:0; background:rgba(43,43,43,.55); display:none;
  align-items:center; justify-content:center; z-index:10;
}
.ovl.show{display:flex;}
.ovl-box{max-width:420px; width:90%; text-align:center; background:var(--paper); padding:22px 16px; max-height:90vh; overflow-y:auto;}
#overlay-big{font-size:34px; margin:0 0 8px; letter-spacing:2px;}
#overlay-text{font-size:15px; margin-bottom:16px; line-height:1.8;}
#overlay-img{width:140px; aspect-ratio:1; background:#fff; border:3px solid var(--ink); border-radius:12px; display:none; margin:0 auto 10px;}
#bench-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;}
#bench-grid .slot{padding:4px;}
#bench-grid .slot .stats{font-size:10px;}
.statline{display:flex; justify-content:space-between; max-width:250px; margin:0 auto; font-size:15px;}
.movelist{text-align:left; max-width:280px; margin:8px auto 0; font-size:13px; line-height:1.7;}
.movelist small{opacity:.65;}
</style>
</head>
<body>
<div id="app">

  <!-- タイトル -->
  <div id="title-screen" class="screen active">
    <h1>ラクガキバトラーズ</h1>
    <div class="subtitle" id="subtitle-el">〜 描いた6体でデッキバトル 〜（試作版）</div>
    <div class="langrow">
      <button class="langbtn" data-lang="en" onclick="setLang('en')">English</button>
      <button class="langbtn sel" data-lang="ja" onclick="setLang('ja')">日本語</button>
      <button class="langbtn" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="langbtn" data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button class="langbtn" data-lang="de" onclick="setLang('de')">Deutsch</button>
    </div>
    <div class="wobble" style="font-size:14px; line-height:1.9;" id="rules-box"></div>
    <div class="center" style="margin-top:16px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <button class="primary" id="mkdeck-btn" onclick="show('deck-screen'); renderDeck();">✏️ デッキをつくる</button>
      <button id="chart-btn" onclick="openTypeChart()">📊 タイプ相性表</button>
    </div>
  </div>

  <!-- デッキ編成 -->
  <div id="deck-screen" class="screen">
    <h2 id="deck-h2">デッキをつくろう</h2>
    <div class="subtitle" id="deck-sub">スロットをタップ→描く or ストックから選ぶ。各時間5体までストックできるよ</div>
    <div id="deck-grid"></div>
    <div class="center" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <button class="primary" id="battle-btn" onclick="startBattle()" disabled>⚔️ AI対戦</button>
      <button id="free-btn" onclick="startOnline('free')" disabled>🌐 フリー対戦</button>
      <button id="friend-btn" onclick="startOnline('friend')" disabled>🤝 友人対戦</button>
      <button id="reset-btn" onclick="resetDeck()">🗑️ 全ストック削除</button>
      <button onclick="openTypeChart()">📊</button>
    </div>
  </div>

  <!-- お絵描き -->
  <div id="draw-screen" class="screen">
    <div id="draw-header">
      <span class="badge" id="draw-tier">3分モンスター</span>
      <span id="draw-stats" style="font-size:12px;"></span>
    </div>
    <div id="draw-msg"></div>
    <div id="timer-row">
      <div id="timer-wrap"><div id="timer-bar"></div></div>
      <div id="time-text">0:00</div>
    </div>
    <canvas id="paint" width="400" height="400"></canvas>
    <div id="tools">
      <button class="tool sel" data-size="5" title="細筆">✏️</button>
      <button class="tool" data-size="12" title="中筆">🖊️</button>
      <button class="tool" data-size="26" title="太筆">🖌️</button>
      <button class="tool" data-size="-1" title="消しゴム">🧽</button>
      <button class="tool" data-size="-2" title="塗りつぶし">🪣</button>
      <button class="tool" id="undo-btn" title="ひとつ戻す">↩️</button>
    </div>
    <div id="palette"></div>
    <div class="center"><button class="primary" id="done-btn" onclick="finishDrawing()">かんせい！</button></div>
  </div>

  <!-- バトル -->
  <div id="battle-screen" class="screen">
    <div id="battle-top">
      <span class="badge" id="b-score-p">きみ 6/6</span>
      <button onclick="openTypeChart()" style="font-size:12px; padding:2px 10px;">📊</button>
      <span class="badge" id="b-score-e">あいて 6/6</span>
    </div>
    <div class="bench" id="p-bench"></div>
    <div id="arena">
      <div class="fighter wobble" id="f-player">
        <span class="ftype" id="p-type"></span>
        <canvas id="p-img" width="400" height="400"></canvas>
        <div class="fname" id="p-name"></div>
        <div class="fcond" id="p-cond"></div>
        <div class="hpbar"><div class="hpfill" id="p-hp"></div></div>
        <div class="hpnum" id="p-hpnum"></div>
      </div>
      <div class="fighter wobble" id="f-enemy">
        <span class="ftype" id="e-type"></span>
        <canvas id="e-img" width="400" height="400"></canvas>
        <div class="fname" id="e-name">???</div>
        <div class="fcond" id="e-cond"></div>
        <div class="hpbar"><div class="hpfill" id="e-hp"></div></div>
        <div class="hpnum" id="e-hpnum"></div>
      </div>
    </div>
    <div class="bench" id="e-bench"></div>
    <div id="hint"></div>
    <div id="actions"></div>
    <div id="switch-row"><button id="switch-btn" onclick="openBench('switch')">🔄 こうたい（ターンを消費する）</button></div>
    <div id="blog"></div>
  </div>

  <!-- 結果／ステータス発表オーバーレイ -->
  <div id="overlay" class="ovl">
    <div class="ovl-box wobble">
      <canvas id="overlay-img" width="400" height="400"></canvas>
      <div id="overlay-big"></div>
      <div id="overlay-text"></div>
      <button class="primary" id="overlay-btn">つぎへ</button>
      <button id="overlay-btn2" style="display:none;">…</button>
    </div>
  </div>

  <!-- ベンチ（先発／こうたい／強制交代）オーバーレイ -->
  <div id="bench-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="bench-title" style="font-size:18px; margin-bottom:10px;">だれを出す？</div>
      <div id="bench-grid"></div>
      <button id="bench-cancel" onclick="closeBench()">やめる</button>
    </div>
  </div>

  <!-- 友人対戦：あいことば入力 -->
  <div id="word-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div style="font-size:18px; margin-bottom:8px;" id="friend-title">🤝 友人対戦</div>
      <div style="font-size:13px; margin-bottom:10px;" id="friend-text">友だちと同じ<b>あいことば</b>を入力してね</div>
      <input id="word-input" maxlength="20" placeholder="あいことば"
        onkeydown="if(event.key==='Enter')submitWord()"
        style="font-family:inherit; font-size:16px; padding:8px 12px; border:3px solid var(--ink); border-radius:10px; width:80%; margin-bottom:12px;">
      <div style="display:flex; gap:8px; justify-content:center;">
        <button class="primary" id="connect-btn" onclick="submitWord()">せつぞく！</button>
        <button id="word-quit" onclick="document.getElementById('word-overlay').classList.remove('show')">やめる</button>
      </div>
    </div>
  </div>

  <!-- 通信ステータス -->
  <div id="net-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="net-text" style="font-size:15px; margin-bottom:14px; line-height:1.8;">…</div>
      <button id="net-cancel">キャンセル</button>
    </div>
  </div>

  <!-- ストック一覧（ティアごと最大5体） -->
  <div id="stock-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="stock-title" style="font-size:18px; margin-bottom:10px;">📦 ストック</div>
      <div id="stock-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;"></div>
      <button id="stock-close" onclick="closeStockOverlay()">とじる</button>
    </div>
  </div>

  <!-- モンスター操作メニュー -->
  <div id="edit-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="edit-title" style="font-size:18px; margin-bottom:12px;">✏️ このモンスターをどうする？</div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:stretch;">
        <button class="primary" id="menu-select" onclick="selectMon()">⭐ デッキに入れる</button>
        <button id="menu-edit" onclick="editSlot(true)">✏️ 描き足し・修正する<br><small style="font-size:11px; opacity:.65;">今の絵の続きから（インク時間は全回復）</small></button>
        <button id="menu-redraw" onclick="editSlot(false)">🎨 まっさらから描き直す</button>
        <button id="menu-rename" onclick="renameMon()">📛 名前を変える</button>
        <button id="menu-delete" onclick="deleteSlot()">🗑️ この1体を削除する</button>
        <button id="menu-back" onclick="closeEditMenu()">もどる</button>
      </div>
      <div style="font-size:11px; opacity:.65; margin-top:10px;" id="edit-note">※編集して完成させるとステータス・タイプ・技は決め直されるよ</div>
    </div>
  </div>

  <!-- タイプ相性図 -->
  <div id="chart-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="chart-title" style="font-size:20px; margin-bottom:4px;">📊</div>
      <div id="chart-svg"></div>
      <div id="chart-mutual" style="font-size:13px; margin:2px 0 6px;"></div>
      <div id="chart-legend" style="font-size:12px; line-height:1.7; margin-bottom:12px; text-align:left;"></div>
      <button id="chart-close" onclick="document.getElementById('chart-overlay').classList.remove('show')">閉じる</button>
    </div>
  </div>

  <!-- 汎用ピッカー（強奪・入れ替え） -->
  <div id="pick-overlay" class="ovl">
    <div class="ovl-box wobble">
      <div id="pick-title" style="font-size:18px; margin-bottom:10px;">えらぼう</div>
      <div id="pick-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;"></div>
      <button id="pick-cancel">やめる</button>
    </div>
  </div>

</div>
<script>
'use strict';
/* ============ 定数 ============ */
const PALETTE = [
  {hex:'#2b2b2b', name:'くろ'},
  {hex:'#e74c3c', name:'あか'},
  {hex:'#2980d9', name:'あお'},
  {hex:'#27ae60', name:'みどり'},
  {hex:'#f39c12', name:'オレンジ'},
  {hex:'#8e44ad', name:'むらさき'},
  {hex:'#e91e8c', name:'ピンク'},
  {hex:'#f5d90a', name:'きいろ'},
  {hex:'#00bcd4', name:'みずいろ'},
  {hex:'#795548', name:'ちゃいろ'},
];
PALETTE.forEach(p=>{
  p.rgb = [parseInt(p.hex.slice(1,3),16), parseInt(p.hex.slice(3,5),16), parseInt(p.hex.slice(5,7),16)];
});

const I18N = {

  renamePrompt:'あたらしい名前は？（14文字まで）', stockClose:'とじる',
  benchStarter:'先発モンスターを選ぼう！', benchForced:'つぎのモンスターを選ぼう！', benchSwitch:'だれとこうたいする？', benchCancel:'やめる',

/* 相性は攻防両面に効く：
   得意な相手 → 攻撃補正×1.3 ＋ 相手の防御弱体×1.3 ＝ 約1.7倍
   不得意な相手 → 攻撃減×0.75 ＋ 相手の防御強化×0.75 ＝ 約0.56倍
   🔥>🌿, 🌿>💧, 💧>🔥。🌑⇔✨は相互弱点（お互い1.7倍） */
function beats(a, d){
  return (a===0&&d===2)||(a===2&&d===1)||(a===1&&d===0)||(a===3&&d===4)||(a===4&&d===3);
}
function typeMult(a, d){
  if(beats(a,d)) return 1.69;   // 1.3(攻撃UP) × 1.3(相手の防御DOWN)
  if(beats(d,a)) return 0.5625; // 0.75(攻撃DOWN) × 0.75(相手の防御UP)
  return 1;
}

function mkMove(cat, db, rel){
  if(cat==='atk1') return {name:pick(db.atk1), cat:'atk', pow:1.0, acc:1};
  if(cat==='atk2') return {name:pick(db.atk2), cat:'atk', pow:1.5, acc:0.85};
  if(cat==='def')  return {name:pick(db.def), cat:'def'};
  if(cat==='heal') return {name:pick(db.heal), cat:'heal', uses:3, maxUses:3};
  if(cat==='buff'){
    // ステータス傾向に合った強化を選びやすい
    const cands = db.buff.map(([n,s])=>({n,s,w:0.3+(rel?rel[s]||0:Math.random())}));
    const tot = cands.reduce((a,c)=>a+c.w,0);
    let r = Math.random()*tot;
    for(const c of cands){ r-=c.w; if(r<=0) return {name:c.n, cat:'buff', sub:c.s}; }
    return {name:cands[0].n, cat:'buff', sub:cands[0].s};
  }
  if(cat==='debuff'){ const [n,s]=pick(db.debuff); return {name:n, cat:'debuff', sub:s}; }
  const [n,k]=pick(db.status); return {name:n, cat:'status', kind:k};
}
/* 絵のイメージ（タイプ）とステータスに合わせて4技を付与 */
function genMoves(m){
  const t = TIERS[m.tier];
  const rel = {
    hp:(m.maxHp-t.hp[0])/(t.hp[1]-t.hp[0]), atk:(m.atk-t.atk[0])/(t.atk[1]-t.atk[0]),
    def:(m.def-t.def[0])/(t.def[1]-t.def[0]), spd:(m.spd-t.spd[0])/(t.spd[1]-t.spd[0]),
  };
  const db = MOVE_DB[m.type];
  const moves = [mkMove('atk1', db, rel)]; // 1枠目は必ず攻撃技
  const pool = ['atk2','def','heal','buff','debuff','status'];
  const w = {
    atk2:0.3+rel.atk, def:0.2+rel.def, heal:0.25+rel.hp*0.8,
    buff:0.5, debuff:0.5, status:0.55,
  };
  for(let k=0;k<3;k++){
    const tot = pool.reduce((s,c)=>s+w[c],0);
    let r = Math.random()*tot, chosen = pool[0];
    for(const c of pool){ r-=w[c]; if(r<=0){chosen=c; break;} }
    moves.push(mkMove(chosen, db, rel));
    pool.splice(pool.indexOf(chosen),1);
  }
  return moves;
}
function moveDesc(mv){
  if(mv.cat==='atk') return T('desc_atk',{p:Math.round(mv.pow*100)}) + (mv.acc<1 ? T('desc_acc',{a:Math.round(mv.acc*100)}) : '');
  if(mv.cat==='def') return T('desc_def');
  if(mv.cat==='heal') return T('desc_heal',{n:mv.uses});
  if(mv.cat==='buff') return T('desc_buff',{s:statName(mv.sub)});
  if(mv.cat==='debuff') return T('desc_debuff',{s:statName(mv.sub)});
  return T('desc_status',{k:kindName(mv.kind)});
}

    moves:m.moves.map(mv=>({name:mv.name, cat:mv.cat, pow:mv.pow, acc:mv.acc, sub:mv.sub, kind:mv.kind, maxUses:mv.maxUses}))};
}

  try{
    localStorage.setItem('rkgk-stock-v1', JSON.stringify({
      stock: S.stock.map(arr=>arr.map(monToJSON)),
      sel: S.deckSel,
    }));
  }catch(e){ console.warn('ストック保存に失敗（容量オーバーかも）', e); }
}
function loadStock(){
  try{
    const d = JSON.parse(localStorage.getItem('rkgk-stock-v1')||'null');
    if(!d) return;
    S.stock = TIERS.map((t,i)=>((d.stock&&d.stock[i])||[]).slice(0,STOCK_MAX).map(o=>reviveMon(o,i)).filter(Boolean));
    S.deckSel = TIERS.map((t,i)=>{
      const v = d.sel ? d.sel[i] : null;
      return (v!=null && S.stock[i][v]) ? v : (S.stock[i].length ? 0 : null);
    });
  }catch(e){}
}

let AC=null;
function beep(freq, dur=0.1, type='square', vol=0.12, when=0){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, AC.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+when+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(AC.currentTime+when); o.stop(AC.currentTime+when+dur+0.02);
  }catch(e){}
}
const sfx = {
  hit:   ()=>{beep(160,0.12,'square',0.15); beep(90,0.15,'sawtooth',0.12,0.03);},
  guard: ()=>beep(70,0.2,'triangle',0.18),
  charge:()=>{beep(300,0.08); beep(450,0.08,'square',0.12,0.08); beep(650,0.12,'square',0.12,0.16);},
  heal:  ()=>[392,523,659].forEach((f,i)=>beep(f,0.12,'sine',0.12,i*0.09)),
  debuff:()=>[500,380,260].forEach((f,i)=>beep(f,0.1,'triangle',0.12,i*0.08)),
  win:   ()=>[523,659,784,1046].forEach((f,i)=>beep(f,0.14,'triangle',0.15,i*0.12)),
  lose:  ()=>[400,330,260,180].forEach((f,i)=>beep(f,0.2,'sawtooth',0.1,i*0.15)),
  draw:  ()=>beep(880,0.05,'sine',0.05),
  ko:    ()=>[300,200,120].forEach((f,i)=>beep(f,0.15,'square',0.13,i*0.1)),
  reveal:()=>[440,554,659,880].forEach((f,i)=>beep(f,0.12,'triangle',0.13,i*0.1)),
};

/* ============ お絵描き ============ */
const paint = $('paint'), pctx = paint.getContext('2d', {willReadFrequently:true});
let brushSize = 5, brushColor = 0, toolMode = 'pen';
let drawing = false, lastPt = null, lastMove = 0;
let undoStack = [];

function pos(e){
  const r = paint.getBoundingClientRect();
  return {x:(e.clientX-r.left)*paint.width/r.width, y:(e.clientY-r.top)*paint.height/r.height};
}
paint.addEventListener('pointerdown', e=>{
  e.preventDefault();
  paint.setPointerCapture(e.pointerId);
  if(undoStack.length>14) undoStack.shift();
  undoStack.push(pctx.getImageData(0,0,400,400));
  const p = pos(e);
  if(toolMode === 'fill'){
    floodFill(p.x, p.y);
    sfx.draw();
    return;
  }
  drawing = true; lastPt = p;
  drawSeg(lastPt, lastPt);
});
paint.addEventListener('pointermove', e=>{
  if(!drawing) return;
  const p = pos(e); drawSeg(lastPt, p); lastPt = p;
});
window.addEventListener('pointerup', ()=>{
  if(drawing){ drawing=false; sfx.draw(); }
});
function drawSeg(a,b){
  lastMove = Date.now();
  pctx.save();
  pctx.lineCap='round'; pctx.lineJoin='round';
  if(toolMode === 'eraser'){
    pctx.globalCompositeOperation='destination-out';
    pctx.lineWidth = 30;
  }else{
    pctx.globalCompositeOperation='source-over';
    pctx.strokeStyle = PALETTE[brushColor].hex;
    pctx.lineWidth = brushSize;
  }
  pctx.beginPath(); pctx.moveTo(a.x,a.y); pctx.lineTo(b.x+0.01,b.y+0.01); pctx.stroke();
  pctx.restore();
}
function floodFill(sx, sy){
  sx = Math.round(sx); sy = Math.round(sy);
  if(sx<0 || sy<0 || sx>=400 || sy>=400) return;
  const img = pctx.getImageData(0,0,400,400), d = img.data;
  const si = (sy*400+sx)*4;
  const t = [d[si], d[si+1], d[si+2], d[si+3]];
  const [fr,fg,fb] = PALETTE[brushColor].rgb;
  if(t[3]>200 && Math.abs(t[0]-fr)<10 && Math.abs(t[1]-fg)<10 && Math.abs(t[2]-fb)<10) return;
  const match = i => {
    const dr=d[i]-t[0], dg=d[i+1]-t[1], db=d[i+2]-t[2], da=d[i+3]-t[3];
    return dr*dr + dg*dg + db*db + da*da < 4900;
  };
  const seen = new Uint8Array(400*400);
  const stack = [sy*400+sx];
  seen[sy*400+sx] = 1;
  while(stack.length){
    const p = stack.pop(), i = p*4;
    d[i]=fr; d[i+1]=fg; d[i+2]=fb; d[i+3]=255;
    const x = p%400, y = (p-x)/400;
    if(x>0)  { const q=p-1;   if(!seen[q] && match(q*4)){seen[q]=1; stack.push(q);} }
    if(x<399){ const q=p+1;   if(!seen[q] && match(q*4)){seen[q]=1; stack.push(q);} }
    if(y>0)  { const q=p-400; if(!seen[q] && match(q*4)){seen[q]=1; stack.push(q);} }
    if(y<399){ const q=p+400; if(!seen[q] && match(q*4)){seen[q]=1; stack.push(q);} }
  }
  pctx.putImageData(img,0,0);
}
function makeThumb(){
  const c = document.createElement('canvas');
  c.width = 200; c.height = 200;
  c.getContext('2d').drawImage(paint, 0, 0, 200, 200);
  return c.toDataURL();
}

/* ============ 絵の解析 ============ */
function analyzeArt(ctx){
  const img = ctx.getImageData(0,0,400,400).data;
  const colorCount = new Array(PALETTE.length).fill(0);
  let covered=0, total=0, minX=400, maxX=-1, minY=400, maxY=-1;
  for(let y=0; y<400; y+=4){
    for(let x=0; x<400; x+=4){
      total++;
      const i = (y*400+x)*4;
      if(img[i+3] > 30){
        covered++;
        if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
        let best=0, bd=1e9;
        for(let c=0; c<PALETTE.length; c++){
          const [r,g,b] = PALETTE[c].rgb;
          const d2 = (img[i]-r)**2 + (img[i+1]-g)**2 + (img[i+2]-b)**2;
          if(d2<bd){bd=d2; best=c;}
        }
        colorCount[best]++;
      }
    }
  }
  if(covered === 0){
    return {type:ri(0,4), weights:{hp:.5,atk:.5,def:.5,spd:.5}, reason:'reason_blank'};
  }
  const typeScore = new Array(TYPES.length).fill(0);
  colorCount.forEach((n,c)=> typeScore[COLOR_TYPE[c]] += n * COLOR_WEIGHT[c]);
  let type = 0, ts = -1;
  typeScore.forEach((v,i)=>{ if(v>ts){ts=v; type=i;} });
  const covRatio = covered/total;
  const bboxArea = (maxX-minX+4)*(maxY-minY+4);
  const bboxRatio = bboxArea/(400*400);
  const density = Math.min(1, covered*16/bboxArea);
  const warm = (colorCount[1]+colorCount[4])/covered;
  const bright = (colorCount[6]+colorCount[7]+colorCount[8])/covered;
  const weights = {
    hp:  clamp01(bboxRatio*1.8),
    atk: clamp01(warm*1.6 + covRatio*0.3),
    def: clamp01(density*1.1),
    spd: clamp01((1-density)*0.8 + bright*0.8),
  };
  const top = Object.entries(weights).sort((a,b)=>b[1]-a[1])[0][0];
  return {type, weights, reason:'reason_'+top};
}
function rollStats(tierIdx, weights){
  const t = TIERS[tierIdx];
  const roll = (range, w) => Math.round(range[0] + (range[1]-range[0]) * clamp01(0.35*Math.random() + 0.65*w));
  return {
    hp: roll(t.hp, weights.hp), atk: roll(t.atk, weights.atk),
    def: roll(t.def, weights.def), spd: roll(t.spd, weights.spd),
  };
}

function startDrawing(tier, keepArt=false, stockIdx=null){
  try{ AC = AC || new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(stockIdx===null && S.stock[tier].length>=STOCK_MAX) return; // 満杯ガード
  S.drawTier = tier; S.drawStockIdx = stockIdx;
  const t = TIERS[tier];
  pctx.clearRect(0,0,400,400);
  if(keepArt && stockIdx!==null && S.stock[tier][stockIdx]){
    // 既存の絵を読み込んで続きから編集
    const img = new Image();
    img.onload = ()=>pctx.drawImage(img,0,0,400,400);
    img.src = S.stock[tier][stockIdx].url;
  }
  undoStack = [];
  closeStockOverlay();
  show('draw-screen');
  renderPalette();
  $('draw-tier').textContent = T('drawTier',{min:t.min});
  $('draw-stats').textContent = `❤️${t.hp[0]}〜${t.hp[1]} ⚔️${t.atk[0]}〜${t.atk[1]} 🛡️${t.def[0]}〜${t.def[1]} 💨${t.spd[0]}〜${t.spd[1]}`;
  $('draw-msg').textContent = T('drawMsg',{min:t.min});
  startTimer(t.min * 60);
}
function startTimer(sec){
  clearInterval(S.timerId);
  S.timeMax = sec; S.timeLeft = sec;
  $('timer-bar').style.width = '100%';
  $('time-text').textContent = fmtTime(sec);
  S.timerId = setInterval(()=>{
    const penActive = drawing && (Date.now() - lastMove < 250);
    if(penActive) S.timeLeft -= 0.1;
    $('timer-bar').style.width = Math.max(0, S.timeLeft/S.timeMax*100) + '%';
    $('time-text').textContent = fmtTime(S.timeLeft);
    if(S.timeLeft <= 0) finishDrawing();
  }, 100);
}
function finishDrawing(){
  clearInterval(S.timerId);
  drawing = false;
  const tier = S.drawTier;
  let m;
  if(S.drawStockIdx!==null && S.stock[tier][S.drawStockIdx]){
    m = S.stock[tier][S.drawStockIdx]; // 既存モンスターを上書き編集
  }else{
    m = blankSlot(tier);
    const n = S.stock[tier].length;
    m.name = n>0 ? T('defaultNameN',{min:TIERS[tier].min, n:n+1}) : T('defaultName',{min:TIERS[tier].min});
    S.stock[tier].push(m);
    S.drawStockIdx = S.stock[tier].length - 1;
  }
  m.url = paint.toDataURL();
  m.thumb = makeThumb(); // 通信用の縮小版（オンライン対戦のデッキ交換を軽くする）
  const a = analyzeArt(pctx);
  const st = rollStats(m.tier, a.weights);
  m.type = a.type;
  m.hp = st.hp; m.maxHp = st.hp; m.atk = st.atk; m.def = st.def; m.spd = st.spd;
  m.moves = genMoves(m);
  S.deckSel[tier] = S.drawStockIdx; // 完成したコをデッキに入れる
  saveStock();
  sfx.reveal();
  const oi = $('overlay-img');
  oi.style.display='block';
  const ox = oi.getContext('2d'); ox.clearRect(0,0,400,400); ox.drawImage(paint,0,0);
  overlay(
    T('revType',{i:TYPES[m.type].icon, t:typeName(m.type)}),
    `<i>${T(a.reason)}</i><br>
     <div class="statline"><span>${T('statL_hp')}</span><b>${st.hp}</b></div>
     <div class="statline"><span>${T('statL_atk')}</span><b>${st.atk}</b></div>
     <div class="statline"><span>${T('statL_def')}</span><b>${st.def}</b></div>
     <div class="statline"><span>${T('statL_spd')}</span><b>${st.spd}</b></div>
     <div class="movelist"><b>${T('learned')}</b><br>${m.moves.map(mv=>`${CAT_ICON[mv.cat]} ${trMove(mv.name)}　<small>${moveDesc(mv)}</small>`).join('<br>')}</div>
     <div style="margin-top:10px;">${T('nameLabel')}
       <input id="name-input" maxlength="14" value="${baseName(m).replace(/"/g,'')}"
         style="font-family:inherit; font-size:15px; padding:6px 10px; border:3px solid var(--ink); border-radius:10px; width:60%;">
     </div>`,
    T('backDeck'),
    ()=>{
      const inp = $('name-input');
      const nv = inp ? escName(inp.value) : '';
      if(nv) m.name = nv;
      saveStock();
      $('overlay-img').style.display='none';
      show('deck-screen'); renderDeck();
    }
  );
}

/* ============ 敵生成 ============ */
function genEnemyCanvas(tierIdx){
  const c = document.createElement('canvas');
  c.width=400; c.height=400;
  const x = c.getContext('2d');
  const hue = ri(0,360);
  x.lineWidth = 5; x.lineCap='round';
  x.strokeStyle = `hsl(${hue},60%,30%)`;
  x.fillStyle = `hsl(${hue},70%,80%)`;
  const cx=200, cy=210, base=rand(80,115);
  const pts=[], n=10;
  for(let i=0;i<n;i++){
    const a = i/n*Math.PI*2;
    const r = base * rand(0.75,1.3);
    pts.push([cx+Math.cos(a)*r, cy+Math.sin(a)*r]);
  }
  x.beginPath();
  x.moveTo((pts[0][0]+pts[n-1][0])/2,(pts[0][1]+pts[n-1][1])/2);
  for(let i=0;i<n;i++){
    const nx=pts[(i+1)%n];
    x.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+nx[0])/2,(pts[i][1]+nx[1])/2);
  }
  x.closePath(); x.fill(); x.stroke();
  const spikes = tierIdx + 1;
  x.fillStyle = `hsl(${hue},60%,45%)`;
  for(let i=0;i<spikes;i++){
    const a = rand(0,Math.PI*2);
    const r1 = base*1.05, r2 = base*1.45;
    x.beginPath();
    x.moveTo(cx+Math.cos(a-0.12)*r1, cy+Math.sin(a-0.12)*r1);
    x.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2);
    x.lineTo(cx+Math.cos(a+0.12)*r1, cy+Math.sin(a+0.12)*r1);
    x.closePath(); x.fill(); x.stroke();
  }
  x.strokeStyle = `hsl(${hue},60%,30%)`;
  const limbs = ri(2,5);
  for(let i=0;i<limbs;i++){
    const a = rand(0.2,Math.PI-0.2)+ (i%2?0:Math.PI);
    let px_=cx+Math.cos(a)*base, py=cy+Math.sin(a)*base;
    x.beginPath(); x.moveTo(px_,py);
    for(let j=0;j<3;j++){ px_+=rand(-38,38); py+=rand(-10,45); x.lineTo(px_,py); }
    x.stroke();
  }
  const ew = rand(26,42), gap=rand(34,60), ey=cy-base*0.35;
  [[cx-gap,ey],[cx+gap,ey]].forEach(([ex2,ey2])=>{
    x.fillStyle='#fff'; x.beginPath(); x.arc(ex2,ey2,ew/2,0,7); x.fill(); x.stroke();
    x.fillStyle='#222'; x.beginPath(); x.arc(ex2+rand(-6,6),ey2+rand(-4,6),ew/5,0,7); x.fill();
  });
  x.beginPath();
  const my=cy+base*0.15;
  x.moveTo(cx-30,my);
  x.quadraticCurveTo(cx, my+rand(-18,30), cx+30, my);
  x.stroke();
  return c;
}
function genEnemyDeck(){

/* 敵AI：状況で技を選ぶ */
const HINTS = {
  atk:'👀 {n} から殺気を感じる…！', def:'👀 {n} は身構えているようだ…',
  heal:'👀 {n} は傷を気にしている…', buff:'👀 {n} は力を溜めたそうにしている…',
  debuff:'👀 {n} がいやらしい目でこちらを見ている…', status:'👀 {n} があやしい動きをしている…',
};
function decideEnemy(){
  const e = EM(), p = PM();
  const scores = e.moves.map(mv=>{
    if(mv.cat==='atk') return mv.pow*10*typeMult(e.type,p.type)*(mv.acc||1);
    if(mv.cat==='def') return 5;
    if(mv.cat==='heal') return (mv.uses>0 && e.hp/e.maxHp<0.45) ? 20 : 0.3;
    if(mv.cat==='buff') return e.stg[mv.sub]>=3 ? 0.3 : (S.turn<3 ? 9 : 4);
    if(mv.cat==='debuff') return p.stg[mv.sub]<=-3 ? 0.3 : 6;
    return p.status ? 0.2 : 9; // status
  });
  const tot = scores.reduce((a,b)=>a+b,0);
  let r = Math.random()*tot, idx = 0;
  for(let i=0;i<scores.length;i++){ r-=scores[i]; if(r<=0){idx=i; break;} }
  S.eNext = e.moves[idx];
  const cats = ['atk','def','heal','buff','debuff','status'];
  const shown = Math.random()<0.65 ? S.eNext.cat : pick(cats.filter(c=>c!==S.eNext.cat));
  $('hint').textContent = T('hint_'+shown, {n:e.name});
}
/* ダメージ・回避 */
function calcDmg(a, d, pow){
  const m = typeMult(a.type, d.type);
  const base = effAtk(a) * 1.9 * pow * rand(0.85,1.15);
  const reduced = base * 100 / (100 + effDef(d)*3);
  return {dmg: Math.max(1, Math.round(reduced * m)), m};
}
function dodgeP(a, d){
  return Math.max(0.02, Math.min(0.40, 0.06 + (effSpd(d)-effSpd(a))*0.015));
}

/* ---- 技の実行 ---- */
async function execMove(side, mv){
  const me = side==='p' ? PM() : EM();
  const foe = side==='p' ? EM() : PM();
  const meCard = side==='p' ? 'f-player' : 'f-enemy';
  const foeCard = side==='p' ? 'f-enemy' : 'f-player';
  const foeDef = side==='p' ? S.eDef : S.pDef;
  if(me.ko) return;
  const mvN = trMove(mv.name);
  // まひチェック
  if(me.status && me.status.kind==='para' && Math.random()<0.3){
    log(T('para_cant',{n:me.name}));
    return;
  }
  if(mv.cat==='def'){
    log(T('def_use',{n:me.name, m:mvN})); sfx.guard();
    return;
  }
  if(mv.cat==='atk'){
    if(foe.ko) return;
    if(mv.acc<1 && Math.random()>mv.acc){
      log(T('atk_miss',{n:me.name, m:mvN}));
      return;
    }
    if(foeDef){
      const r = calcDmg(me, foe, mv.pow*0.25);
      foe.hp -= r.dmg;
      const counter = Math.max(1, Math.round(effAtk(foe)*0.5));
      me.hp -= counter;
      log(T('atk_blocked',{f:foe.name, n:me.name, m:mvN, d:r.dmg, c:counter}));
      shake(foeCard); shake(meCard); sfx.guard();
    }else{
      if(Math.random() < dodgeP(me, foe)){
        log(T('atk_dodge',{n:me.name, m:mvN, f:foe.name}));
        return;
      }
      const r = calcDmg(me, foe, mv.pow);
      foe.hp -= r.dmg;
      log(T('atk_hit',{n:me.name, m:mvN, d:r.dmg, x:multNote(r.m)}));
      shake(foeCard); sfx.hit();
    }
    return;
  }
  if(mv.cat==='heal'){
    if(mv.uses<=0){ log(T('heal_empty',{n:me.name, m:mvN})); return; }
    mv.uses--;
    const amt = Math.min(Math.round(me.maxHp*0.35), me.maxHp-me.hp);
    me.hp += amt;
    log(T('heal_use',{n:me.name, m:mvN, d:amt, u:mv.uses})); sfx.heal();
    return;
  }
  if(mv.cat==='buff'){
    if(me.stg[mv.sub]>=3){ log(T('buff_max',{n:me.name, s:statName(mv.sub)})); return; }
    me.stg[mv.sub]++;
    log(T('buff_use',{n:me.name, m:mvN, s:statName(mv.sub)})); sfx.charge();
    return;
  }
  if(mv.cat==='debuff'){
    if(foe.ko) return;
    if(Math.random()>0.9){ log(T('debuff_miss',{n:me.name, m:mvN})); return; }
    if(foe.stg[mv.sub]<=-3){ log(T('debuff_floor',{f:foe.name, s:statName(mv.sub)})); return; }
    foe.stg[mv.sub]--;
    log(T('debuff_use',{n:me.name, m:mvN, f:foe.name, s:statName(mv.sub)})); sfx.debuff();
    return;
  }
  if(mv.cat==='status'){
    if(foe.ko) return;
    if(foe.status){ log(T('st_already',{n:me.name, m:mvN, f:foe.name})); return; }
    if(Math.random()>0.8){ log(T('st_miss',{n:me.name, m:mvN})); return; }
    foe.status = {kind:mv.kind, turns:4};
    log(T('st_apply',{i:KIND_ICON[mv.kind], n:me.name, m:mvN, f:foe.name, k:kindName(mv.kind)}));
    sfx.debuff();
    return;
  }
}
/* ---- 毎ターン終了時：どく・やけど ---- */
function endOfTurnTicks(){
  for(const [m, card] of [[PM(),'f-player'],[EM(),'f-enemy']]){
    if(m.ko || !m.status) continue;
    if(m.status.kind==='poison'){
      const d = Math.max(1, Math.round(m.maxHp*0.08));
      m.hp -= d; log(T('dot_poison',{n:m.name, d})); shake(card);
    }else if(m.status.kind==='burn'){
      const d = Math.max(1, Math.round(m.maxHp*0.05));
      m.hp -= d; log(T('dot_burn',{n:m.name, d})); shake(card);
    }
    m.status.turns--;
    if(m.status.turns<=0){
      log(T('st_cured',{n:m.name, k:kindName(m.status.kind)}));
      m.status = null;
    }
  }
}
/* ---- KO処理。'end'ならバトル終了済み ---- */
function koSweep(){
  const pM = PM(), eM = EM();
  if(eM.hp<=0 && !eM.ko){
    eM.hp=0; eM.ko=true;
    log(T('ko_enemy',{n:eM.name})); sfx.ko();
  }
  if(pM.hp<=0 && !pM.ko){
    pM.hp=0; pM.ko=true;
    log(T('ko_mine',{n:pM.name})); sfx.ko();
  }
  updateBattleUI();
  if(aliveCount(S.eDeck)===0){ winBattle(); return 'end'; }
  if(aliveCount(S.deck)===0){ loseBattle(); return 'end'; }
  if(EM().ko){
    S.eIdx = enemyPickNext();
    EM().stg = {atk:0,def:0,spd:0};
    log(T('send_next',{n:EM().name, min:TIERS[EM().tier].min}));
    updateBattleUI();
  }
  return null;
}

/* ---- ターン進行 ---- */
async function playerAct(i){
  if(S.busy || !S.inputOn) return;
  const pMv = PM().moves[i];
  if(NET.mode !== 'solo'){ submitAction({kind:'move', i}); return; }
  S.busy = true; setInput(false);
  const eMv = S.eNext;
  S.pDef = pMv.cat==='def';
  S.eDef = eMv.cat==='def';
  log(T('turn_header',{a:PM().name, x:trMove(pMv.name), b:EM().name, y:trMove(eMv.name)}));
  await resolveTurn(pMv, eMv);
}
async function resolveTurn(pMv, eMv){
  S.turn++;
  const pFirst = effSpd(PM())===effSpd(EM()) ? Math.random()<0.5 : effSpd(PM())>effSpd(EM());
  const seq = pFirst ? [['p',pMv],['e',eMv]] : [['e',eMv],['p',pMv]];
  for(const [side, mv] of seq){
    const actor = side==='p' ? PM() : EM();
    if(actor.ko) continue; // 先に倒されたら行動できない
    await sleep(500);
    await execMove(side, mv);
    updateBattleUI();
    if(koSweep()==='end') return;
  }
  await sleep(450);
  endOfTurnTicks();
  updateBattleUI();
  if(koSweep()==='end') return;
  if(PM().ko){ openBench('forced'); return; }
  nextTurn();
}
function nextTurn(){
  decideEnemy();
  S.busy = false;
  setInput(true);
}
function enemyPickNext(){
  const alive = S.eDeck.map((m,i)=>m.ko?null:i).filter(i=>i!==null);
  const adv = alive.filter(i=>typeMult(S.eDeck[i].type, PM().type) > 1);
  if(adv.length && Math.random()<0.6) return pick(adv);
  return pick(alive);
}
/* ---- こうたい（ターン消費） ---- */
async function doSwitch(idx){
  closeBench();
  S.busy = true; setInput(false);
  const eMv = S.eNext;
  S.pIdx = idx;
  PM().stg = {atk:0,def:0,spd:0};
  log(T('switch_self',{n:PM().name}));
  updateBattleUI();
  await sleep(500);
  S.pDef = false;
  S.eDef = eMv.cat==='def';
  await execMove('e', eMv);
  updateBattleUI();
  if(koSweep()==='end') return;
  await sleep(400);
  endOfTurnTicks();
  updateBattleUI();
  if(koSweep()==='end') return;
  if(PM().ko){ openBench('forced'); return; }
  nextTurn();
}

/* ---- ベンチ（先発／こうたい／強制交代） ---- */
function openBench(mode){
  if(mode==='switch' && (S.busy || !S.inputOn)) return;
  S.benchMode = mode;
  updateBenchTitle();
  $('bench-cancel').style.display = mode==='switch' ? '' : 'none';
  const g = $('bench-grid'); g.innerHTML='';
  S.deck.forEach((m,i)=>{
    const selectable = !m.ko && (mode!=='switch' || i!==S.pIdx);
    const d = document.createElement('div');
    d.className = 'slot' + (selectable?'':' done');
    d.style.opacity = selectable ? 1 : .35;
    d.innerHTML = `
      <span class="tier badge">${TIERS[m.tier].min}分</span>
      <span class="ttype">${TYPES[m.type].icon}</span>
      <img src="${m.url}">
      <div class="stats">❤️${Math.max(0,Math.ceil(m.hp))}/${m.maxHp}<br>⚔️${m.atk} 🛡️${m.def} 💨${m.spd}${m.ko?' ✖KO':''}${m.status?' '+KIND_ICON[m.status.kind]:''}</div>`;
    if(selectable) d.addEventListener('click', ()=>benchPick(i));
    g.appendChild(d);
  });
  $('bench-overlay').classList.add('show');
  startBenchTimer(); // PvPの先発・強制交代は30秒制限（同時選択）
}
function benchPick(i){
  const m = S.deck[i];
  if(!m || m.ko) return;
  if(S.benchMode==='switch' && i===S.pIdx) return;
  stopBenchTimer();
  if(S.benchMode==='switch'){
    if(NET.mode==='solo') doSwitch(i);
    else submitAction({kind:'switch', idx:i});
  }else if(S.benchMode==='starter'){
    closeBench();
    S.pIdx = i;
    PM().stg = {atk:0,def:0,spd:0};
    log(T('go_mon',{n:PM().name}));
    updateBattleUI();
    if(NET.mode==='solo') nextTurn();
    else netStarterChosen(i);
  }else{ // forced
    closeBench();
    S.pIdx = i;
    PM().stg = {atk:0,def:0,spd:0};
    updateBattleUI();
    if(NET.mode==='solo'){
      log(T('go_mon',{n:PM().name}));
      nextTurn();
    }else netForcedChosen(i);
  }
}
/* --- 選択制限タイマー（PvPの先発・強制交代：30秒） --- */
const BENCH_LIMIT = 30;
function updateBenchTitle(){
  const base = S.benchMode==='starter' ? T('benchStarter')
    : S.benchMode==='forced' ? T('benchForced') : T('benchSwitch');

function startBenchTimer(){

/* ============================================================
   オンライン対戦（PeerJS / WebRTC・ホスト権威方式）
   ・フリー対戦：公開スロットを巡回してマッチング

const NET = {
  mode:'solo', peer:null, conn:null, tag:'', oppTag:'',
  pendingHost:null, pendingGuest:null,
  myStarter:null, oppStarter:null,
  needA:false, needB:false,
  origNames:null, matched:false, canceled:false,
  helloDone:false, helloTimer:null,
  starterTimer:null, replaceTimer:null,
};
const FREE_SLOTS = 5;
function njHash(s){ let h=5381; for(const ch of s){ h=((h<<5)+h+ch.codePointAt(0))>>>0; } return h.toString(36); }
function netSend(msg){ try{ if(NET.conn && NET.conn.open) NET.conn.send(msg); }catch(e){} }

}
function netStatus(text, btnText){
  $('net-text').innerHTML = text;
  $('net-cancel').textContent = btnText||T('cancelBtn');
  $('net-cancel').onclick = netCancel;
  $('net-cancel').style.display = '';
  $('net-overlay').classList.add('show');
}
function netStatusHide(){ $('net-overlay').classList.remove('show'); }
function netCancel(){
  NET.canceled = true;
  netTeardown();
  netStatusHide();
}
function netTeardown(){
  clearTimeout(NET.helloTimer);
  clearTimeout(NET.starterTimer);
  clearTimeout(NET.replaceTimer);
  stopBenchTimer();
  try{ if(NET.conn) NET.conn.close(); }catch(e){}
  try{ if(NET.peer) NET.peer.destroy(); }catch(e){}
  if(NET.origNames){ S.deck.forEach((m,i)=>{ m.name = NET.origNames[i]; }); NET.origNames=null; }
  Object.assign(NET, {mode:'solo', peer:null, conn:null, pendingHost:null, pendingGuest:null,
    myStarter:null, oppStarter:null, needA:false, needB:false, matched:false, helloDone:false, helloTimer:null});
}
function netExitToDeck(){
  netTeardown();
  show('deck-screen');
  renderDeck();
}
function netDrop(err){
  console.error('[rakugaki] 接続エラー/切断:', err);
  if(NET.mode==='solo') return;
  netTeardown();
  netStatusHide();
  closeBench();
  const detail = (err && err.type) ? `<br><small style="opacity:.6">(${err.type})</small>` : '';
  overlay(T('dropTitle'), T('dropText')+detail, T('backDeck'), ()=>{ show('deck-screen'); renderDeck(); });
}

/* --- マッチング --- */
function matchFriend(word){
  NET.canceled = false; NET.matched = false;
  const id = 'rkgk-f-' + njHash('rakugaki:'+word);
  netStatus(T('connWord',{w:word}));
  tryJoin(id, ()=>tryHost(id, ()=>tryJoin(id, netFail)));
}
function matchFree(){
  NET.canceled = false; NET.matched = false;
  netStatus(T('searching'));
  const slots = [...Array(FREE_SLOTS).keys()].map(i=>'rkgk-free-'+i).sort(()=>Math.random()-0.5);
  const next = ()=>{
    if(NET.canceled) return;
    if(slots.length===0){ tryHost('rkgk-free-'+ri(0,FREE_SLOTS-1), netFail); return; }
    tryJoin(slots.shift(), next);
  };
  next();
}
function cleanupPeer(){ try{ if(NET.peer) NET.peer.destroy(); }catch(e){} NET.peer=null; }
function tryJoin(id, onFail){
  if(NET.canceled) return;
  cleanupPeer();
  const p = new Peer(); NET.peer = p;
  let failed = false;
  const fail = ()=>{ if(failed || NET.matched) return; failed = true; onFail(); };
  p.on('open', ()=>{
    if(NET.canceled){ p.destroy(); return; }
    const c = p.connect(id, {reliable:true});
    const t = setTimeout(fail, 5000);
    c.on('open', ()=>{ clearTimeout(t); NET.mode='guest'; bindConn(c); });
    c.on('error', ()=>{ clearTimeout(t); fail(); });
  });
  p.on('error', e=>{ if(e.type==='peer-unavailable') fail(); });
}
function tryHost(id, onTaken){
  if(NET.canceled) return;
  cleanupPeer();
  const p = new Peer(id); NET.peer = p;
  p.on('open', ()=>{
    if(NET.canceled){ p.destroy(); return; }
    netStatus(T('roomWait'));
  });
  p.on('connection', c=>{
    if(NET.conn){ try{ c.close(); }catch(e){} return; } // 満室
    NET.mode='host'; bindConn(c);
  });
  p.on('error', e=>{ if(e.type==='unavailable-id') onTaken(); });
}
function netFail(){
  cleanupPeer();
  netStatus(T('notFound'), T('closeBtn'));
}

/* --- 接続確立とデッキ交換 --- */
function bindConn(c){
  NET.conn = c; NET.matched = true;
  NET.helloDone = false;
  NET.tag    = NET.mode==='host' ? 'P1' : 'P2';
  NET.oppTag = NET.mode==='host' ? 'P2' : 'P1';
  c.on('data', onNetData);
  c.on('close', netDrop);
  c.on('error', netDrop);
  netStatus(T('found'));
  // 重要：ホスト側は connection イベント時点ではまだ open していないので、open を待ってから送る
  const sendHello = ()=>netSend({type:'hello', deck: serializeDeck()});
  if(c.open) sendHello();
  else c.on('open', sendHello);
  // デッキ交換が一定時間で完了しなければ切断扱い
  clearTimeout(NET.helloTimer);
  NET.helloTimer = setTimeout(()=>{
    if(NET.mode!=='solo' && !NET.helloDone) netDrop();
  }, 25000);
}
function serializeDeck(){
  return S.deck.map(m=>({
    tier:m.tier, type:m.type, name:m.name,
    url:m.thumb || m.url, // 縮小版があればそちらを送る（通信量削減）
    maxHp:m.maxHp, atk:m.atk, def:m.def, spd:m.spd,
    moves:m.moves.map(mv=>({name:mv.name, cat:mv.cat, pow:mv.pow, acc:mv.acc, sub:mv.sub, kind:mv.kind, maxUses:mv.maxUses})),
  }));
}
let _blankUrl = null;
function blankUrl(){
  if(_blankUrl) return _blankUrl;
  const c = document.createElement('canvas'); c.width=400; c.height=400;
  _blankUrl = c.toDataURL();
  return _blankUrl;
}
const CAT_OK=['atk','def','heal','buff','debuff','status'], SUB_OK=['atk','def','spd'], KIND_OK=['poison','burn','para'];
/* モンスター1体を復元（ティア範囲にクランプ＝簡易チート対策・保存データ復元兼用） */
function reviveMon(src, i){
  src = src||{};
  const t = TIERS[i];
  const cl = (v,r)=>Math.max(r[0], Math.min(r[1], Math.round(+v||r[0])));
  const m = {
    tier:i, type:Math.max(0, Math.min(4, src.type|0)),
    name:String(src.name||'ラクガキ').slice(0,20),
    url:(typeof src.url==='string' && src.url.startsWith('data:image')) ? src.url : blankUrl(),
    thumb:(typeof src.thumb==='string' && src.thumb.startsWith('data:image')) ? src.thumb : null,
    maxHp:cl(src.maxHp,t.hp), atk:cl(src.atk,t.atk), def:cl(src.def,t.def), spd:cl(src.spd,t.spd),
    ko:false, stg:{atk:0,def:0,spd:0}, status:null,
  };
  m.hp = m.maxHp;
  const mvs = (Array.isArray(src.moves)?src.moves.slice(0,4):[]).map(mv=>{
    if(!mv || !CAT_OK.includes(mv.cat)) return null;
    const o = {name:String(mv.name||'？？？').slice(0,16), cat:mv.cat};
    if(mv.cat==='atk'){ o.pow=Math.max(0.5,Math.min(1.6,+mv.pow||1)); o.acc=Math.max(0.5,Math.min(1,+mv.acc||1)); }
    if(mv.cat==='heal'){ o.maxUses=Math.min(3,Math.max(1,(mv.maxUses|0)||3)); o.uses=o.maxUses; }
    if(mv.cat==='buff'||mv.cat==='debuff'){ o.sub=SUB_OK.includes(mv.sub)?mv.sub:'atk'; }
    if(mv.cat==='status'){ o.kind=KIND_OK.includes(mv.kind)?mv.kind:'poison'; }
    return o;
  }).filter(Boolean);
  while(mvs.length<4) mvs.push(mkMove('atk1', MOVE_DB[m.type]));
  if(mvs[0].cat!=='atk'){
    const ai = mvs.findIndex(v=>v.cat==='atk');
    if(ai>0){ const tmp=mvs[0]; mvs[0]=mvs[ai]; mvs[ai]=tmp; }
    else mvs[0] = mkMove('atk1', MOVE_DB[m.type]);
  }
  m.moves = mvs;
  return m;
}
function deserializeDeck(arr){
  arr = Array.isArray(arr) ? arr : [];
  return TIERS.map((t,i)=>reviveMon(arr[i], i));
}

/* --- PvPバトル開始 --- */
function beginPvpBattle(oppDeck){
  NET.origNames = S.deck.map(m=>m.name);
  S.deck.forEach(m=>{
    m.hp=m.maxHp; m.ko=false; m.stg={atk:0,def:0,spd:0}; m.status=null;
    m.name = NET.tag+'・'+m.name;
    m.moves.forEach(mv=>{ if(mv.cat==='heal') mv.uses=mv.maxUses; });
  });
  S.eDeck = oppDeck;
  S.eDeck.forEach(m=>{ m.name = NET.oppTag+'・'+m.name; });
  S.busy=true; S.inputOn=false; S.turn=0;
  S.pIdx=0; S.eIdx=0;
  S.pvpWon=false; S.pvpLost=false; S.actionSent=false; S.replaying=false; S.goQueued=false;
  NET.pendingHost=null; NET.pendingGuest=null; NET.myStarter=null; NET.oppStarter=null;
  $('blog').innerHTML='';
  netStatusHide();
  show('battle-screen');
  log(T('pvp_start',{t:NET.tag}));
  $('hint').textContent='';
  updateBattleUI();
  openBench('starter');
  // ホスト側フォールバック：相手の先発選択が届かなければランダム扱いで強制開始
  if(NET.mode==='host'){
    clearTimeout(NET.starterTimer);
    NET.starterTimer = setTimeout(()=>{
      if(NET.mode==='host' && NET.oppStarter===null){
        NET.oppStarter = ri(0,5);
        maybeStartPvp();
      }
    }, (BENCH_LIMIT+5)*1000);
  }
}
function netStarterChosen(idx){
  if(NET.mode==='guest'){
    netSend({type:'starter', idx});
    $('hint').textContent=T('waitStarter');
  }else{
    NET.myStarter = idx;
    $('hint').textContent=T('waitStarter');
    maybeStartPvp();
  }
}
function maybeStartPvp(){
  if(NET.mode!=='host' || NET.myStarter===null || NET.oppStarter===null) return;
  clearTimeout(NET.starterTimer);
  S.pIdx = NET.myStarter; S.eIdx = NET.oppStarter;
  log(`👾 あいての先発は ${EM().name}！`);
  updateBattleUI();
  netSend({type:'start', snap:makeSnap(null,false,false)});
  hostGo();
}

/* --- 状態スナップショット（ホスト→ゲスト同期） --- */
function makeSnap(end, needA, needB){
  const ser = deck => deck.map(m=>({hp:m.hp, ko:m.ko, stg:{...m.stg}, status:m.status?{...m.status}:null, heals:m.moves.map(mv=>mv.uses??null)}));
  return {aIdx:S.pIdx, bIdx:S.eIdx, a:ser(S.deck), b:ser(S.eDeck), end, needA, needB};
}
function applySnapGuest(s){
  // ゲスト視点：自分=b側、あいて=a側
  S.pIdx = s.bIdx; S.eIdx = s.aIdx;
  s.b.forEach((x,i)=>{ const m=S.deck[i]; m.hp=x.hp; m.ko=x.ko; m.stg=x.stg; m.status=x.status; m.moves.forEach((mv,j)=>{ if(x.heals[j]!=null) mv.uses=x.heals[j]; }); });
  s.a.forEach((x,i)=>{ const m=S.eDeck[i]; m.hp=x.hp; m.ko=x.ko; m.stg=x.stg; m.status=x.status; m.moves.forEach((mv,j)=>{ if(x.heals[j]!=null) mv.uses=x.heals[j]; }); });
}

/* --- 行動の送信・収集 --- */
function submitAction(act){
  if(S.busy || !S.inputOn) return;
  if(act.kind==='move'){
    const mv = PM().moves[act.i];
    if(!mv || (mv.cat==='heal' && mv.uses<=0)) return;
  }
  closeBench();
  S.busy=true; setInput(false);
  $('hint').textContent=T('waitAct');
  if(NET.mode==='guest'){ S.actionSent=true; netSend({type:'action', act}); }
  else{ NET.pendingHost = act; tryProcessTurn(); }
}
function tryProcessTurn(){
  if(NET.mode!=='host' || !NET.pendingHost || !NET.pendingGuest) return;
  const h = NET.pendingHost, g = NET.pendingGuest;
  NET.pendingHost = null; NET.pendingGuest = null;
  hostProcessTurn(h, g);
}
async function hostProcessTurn(h, g){
  S.recording = true; S.rec = [];
  const res = await pvpResolve(h, g);
  S.recording = false;
  netSend({type:'turn', logs:S.rec, snap:makeSnap(res.end, res.needA, res.needB)});
  if(res.end){ res.end==='a' ? winBattle() : loseBattle(); return; }
  NET.needA = res.needA; NET.needB = res.needB;
  if(!res.needA && !res.needB){ hostGo(); return; }
  if(res.needA){
    openBench('forced'); // 自分がKO→交代を選ぶ
  }else{
    // 相手が交代中でも、こちらは次の行動を同時に選べる
    S.busy=false; setInput(true);
    $('hint').textContent=T('whatDo');
  }
  if(res.needB){
    // ホスト側フォールバック：相手の交代が届かなければランダム交代で強制続行
    clearTimeout(NET.replaceTimer);
    NET.replaceTimer = setTimeout(()=>{
      if(NET.needB){
        const alive = S.eDeck.map((m,i)=>m.ko?null:i).filter(i=>i!==null);
        if(alive.length) onNetData({type:'replace', idx:pick(alive)});
      }
    }, (BENCH_LIMIT+5)*1000);
  }
}
function hostGo(){
  netSend({type:'go'});
  $('hint').textContent=T('whatDo');
  S.busy=false; setInput(true);
}

/* --- ホスト側ターン解決（両者の行動を同時処理） --- */
async function pvpResolve(hA, gA){
  S.turn++;
  if(hA.kind==='switch'){
    S.pIdx = Math.max(0,Math.min(5,hA.idx|0));
    PM().stg = {atk:0,def:0,spd:0};
    log(T('switch_self',{n:PM().name}));
  }
  if(gA.kind==='switch'){
    S.eIdx = Math.max(0,Math.min(5,gA.idx|0));
    EM().stg = {atk:0,def:0,spd:0};
    log(T('switch_opp',{n:EM().name}));
  }
  updateBattleUI();
  const hMv = hA.kind==='move' ? PM().moves[hA.i|0] : null;
  const gMv = gA.kind==='move' ? (EM().moves[gA.i|0] || EM().moves[0]) : null;
  S.pDef = !!(hMv && hMv.cat==='def');
  S.eDef = !!(gMv && gMv.cat==='def');
  if(hMv && gMv){
    log(T('turn_header',{a:PM().name, x:trMove(hMv.name), b:EM().name, y:trMove(gMv.name)}));
    const pFirst = effSpd(PM())===effSpd(EM()) ? Math.random()<0.5 : effSpd(PM())>effSpd(EM());
    const seq = pFirst ? [['p',hMv],['e',gMv]] : [['e',gMv],['p',hMv]];
    for(const [side, mv] of seq){
      const actor = side==='p' ? PM() : EM();
      if(actor.ko) continue;
      await sleep(500);
      await execMove(side, mv);
      updateBattleUI();
      pvpKoMark();
      if(pvpEnded()) return pvpResult();
    }
  }else if(hMv){
    await sleep(400); await execMove('p', hMv);
  }else if(gMv){
    await sleep(400); await execMove('e', gMv);
  }
  updateBattleUI();
  pvpKoMark();
  if(pvpEnded()) return pvpResult();
  await sleep(300);
  endOfTurnTicks();
  updateBattleUI();
  pvpKoMark();
  return pvpResult();
}
function pvpKoMark(){
  const pM = PM(), eM = EM();
  if(eM.hp<=0 && !eM.ko){ eM.hp=0; eM.ko=true; log(T('ko_pvp',{n:eM.name})); sfx.ko(); }
  if(pM.hp<=0 && !pM.ko){ pM.hp=0; pM.ko=true; log(T('ko_mine',{n:pM.name})); sfx.ko(); }
  updateBattleUI();
}
function pvpEnded(){ return aliveCount(S.deck)===0 || aliveCount(S.eDeck)===0; }
function pvpResult(){
  if(aliveCount(S.eDeck)===0) return {end:'a', needA:false, needB:false};
  if(aliveCount(S.deck)===0)  return {end:'b', needA:false, needB:false};
  return {end:null, needA:PM().ko, needB:EM().ko};
}
/* --- KO後の交代（PvP） --- */
function netForcedChosen(idx){
  updateBattleUI();
  if(NET.mode==='guest'){
    S.actionSent = false;
    netSend({type:'replace', idx});
    $('hint').textContent='⌛';
  }else{
    log(T('go_mon',{n:PM().name}));
    netSend({type:'replaced', side:'a', idx});
    NET.needA = false;
    // 交代したらすぐ次の行動を選べる（相手の状況を待たない＝同時選択）
    S.busy=false; setInput(true);
    $('hint').textContent=T('whatDo');
    if(!NET.needB) netSend({type:'go'}); // 相手は交代不要→行動選択を開始してもらう
  }
}

/* --- 受信ハンドラ --- */
async function onNetData(msg){
  try{ await onNetDataInner(msg); }
  catch(e){ console.error('[rakugaki] 受信処理エラー:', msg && msg.type, e); }
}
async function onNetDataInner(msg){
  if(!msg || typeof msg !== 'object') return;
  switch(msg.type){
    case 'hello':
      if(NET.helloDone) break; // 二重受信ガード
      NET.helloDone = true;
      clearTimeout(NET.helloTimer);
      beginPvpBattle(deserializeDeck(msg.deck));
      break;
    case 'starter': // host専用
      if(NET.mode!=='host') break;
      NET.oppStarter = Math.max(0, Math.min(5, msg.idx|0));
      maybeStartPvp();
      break;
    case 'start': // guest専用
      applySnapGuest(msg.snap);
      log(T('opp_starter',{n:EM().name}));
      updateBattleUI();
      break;
    case 'go':
      if(S.actionSent) break; // すでにこのターンの行動は送信済み
      if(S.replaying){ S.goQueued=true; break; } // ログ再生が終わってから有効化
      $('hint').textContent=T('whatDo');
      S.busy=false; setInput(true);
      break;
    case 'action': // host専用
      if(NET.mode!=='host') break;
      NET.pendingGuest = msg.act;
      tryProcessTurn();
      break;
    case 'turn': { // guest専用：ホストの解決結果を再生
      S.busy=true; setInput(false); S.actionSent=false; S.replaying=true;
      for(const line of (msg.logs||[])){ log(String(line)); await sleep(350); }
      applySnapGuest(msg.snap);
      updateBattleUI();
      S.replaying=false;
      if(msg.snap.end){ msg.snap.end==='b' ? winBattle() : loseBattle(); break; }
      if(msg.snap.needB){
        openBench('forced'); // 自分がKO→交代を選ぶ
      }else if(msg.snap.needA){
        // 相手が交代中でも、こちらは次の行動を同時に選べる
        S.busy=false; setInput(true);
        $('hint').textContent=T('whatDo');
      }else if(S.goQueued){
        S.goQueued=false;
        S.busy=false; setInput(true);
        $('hint').textContent=T('whatDo');
      }
      break;
    }
    case 'replace': // host専用：ゲストのKO後交代
      if(NET.mode!=='host') break;
      clearTimeout(NET.replaceTimer);
      S.eIdx = Math.max(0, Math.min(5, msg.idx|0));
      EM().stg = {atk:0,def:0,spd:0};
      log(T('send_next2',{n:EM().name}));
      updateBattleUI();
      netSend({type:'replaced', side:'b', idx:S.eIdx});
      NET.needB = false;
      netSend({type:'go'}); // 交代を終えた相手に行動選択を開始してもらう
      // ホスト側の入力はすでに有効（相手の交代中に選択可能）なので何もしない
      break;
    case 'replaced': // guest専用
      if(msg.side==='a'){
        S.eIdx = Math.max(0, Math.min(5, msg.idx|0));
        S.eDeck[S.eIdx].stg = {atk:0,def:0,spd:0};
        log(T('send_next2',{n:EM().name}));
      }
      updateBattleUI();
      break;
    case 'steal': { // 敗者側：モンスターを取られる
      if(!S.pvpLost) break;
      S.pvpLost = false;
      netStatusHide();
      const tier = msg.tier|0;
      if(tier < 0){ // 勝者は何もうばわなかった
        overlay(T('safeTitle'), T('safeText'), T('backDeck'), netExitToDeck);
        break;
      }
      const t = Math.max(0, Math.min(5, tier));
      const victim = S.deck[t]; // バトルに出していた選択中のコ
      const nm = baseName(victim);
      const arr = S.stock[t];
      const ix = arr.indexOf(victim);
      if(ix >= 0){
        arr.splice(ix, 1);
        const sel = S.deckSel[t];
        if(sel!=null){
          if(sel===ix) S.deckSel[t] = arr.length ? 0 : null;
          else if(sel>ix) S.deckSel[t] = sel-1;
        }
        saveStock();
      }
      overlay(T('stolenTitle'), T('stolenText',{n:nm}), T('backDeck'), netExitToDeck);
      break;
    }
  }
}

/* --- 強奪（勝者側） --- */
function openStealPicker(){
  $('pick-title').textContent = T('stealTitle');
  const g = $('pick-grid'); g.innerHTML='';
  S.eDeck.forEach((m,i)=>{
    const d = document.createElement('div');
    d.className = 'slot';
    d.innerHTML = monCard(m);
    d.addEventListener('click', ()=>doSteal(i));
    g.appendChild(d);
  });
  const pc = $('pick-cancel');
  pc.style.display = '';
  pc.textContent = T('mercyBtn');
  pc.onclick = ()=>{
    $('pick-overlay').classList.remove('show');
    netSend({type:'steal', tier:-1});
    overlay(T('mercyTitle'), T('mercyText1'), T('backDeck'), netExitToDeck);
  };
  $('pick-overlay').classList.add('show');
}
function doSteal(idx){
  $('pick-overlay').classList.remove('show');
  const src = S.eDeck[idx];
  const stolen = reviveMon({
    type:src.type, name:baseName(src), url:src.url,
    maxHp:src.maxHp, atk:src.atk, def:src.def, spd:src.spd, moves:src.moves,
  }, src.tier);
  const arr = S.stock[src.tier];
  const finish = ()=>{
    netSend({type:'steal', tier:src.tier});
    saveStock();
    overlay(T('gotTitle'), T('gotText',{n:stolen.name, min:TIERS[src.tier].min}), T('backDeck'), netExitToDeck);
  };
  if(arr.length >= STOCK_MAX){
    // 満杯→入れ替え
    $('pick-title').textContent = T('replaceFull',{min:TIERS[src.tier].min});
    const g = $('pick-grid'); g.innerHTML='';
    arr.forEach((m,i)=>{
      const d = document.createElement('div');
      d.className = 'slot';
      d.innerHTML = monCard(m, S.deckSel[src.tier]===i?'<br>'+T('inDeck'):'');
      d.addEventListener('click', ()=>{
        $('pick-overlay').classList.remove('show');
        arr[i] = stolen;
        finish();
      });
      g.appendChild(d);
    });
    const pc = $('pick-cancel');
    pc.style.display = '';
    pc.textContent = T('replaceCancel');
    pc.onclick = ()=>{
      $('pick-overlay').classList.remove('show');
      netSend({type:'steal', tier:-1});
      overlay(T('mercyTitle'), T('mercyText2'), T('backDeck'), netExitToDeck);
    };
    $('pick-overlay').classList.add('show');
  }else{
    arr.push(stolen);
    if(S.deckSel[src.tier]==null) S.deckSel[src.tier] = arr.length-1;
    finish();
  }
}

/* ============ タイプ相性図 ============ */
function openTypeChart(){
  $('chart-title').textContent = T('chartTitle');
  $('chart-mutual').textContent = T('chartMutual');
  $('chart-legend').innerHTML = T('chartLegend');
  $('chart-close').textContent = T('closeBtn');
  // ノード位置：🔥上、🌿左下、💧右下（三すくみ）＋ 🌑✨（相互弱点）
  const pos = {0:[150,55], 2:[75,185], 1:[225,185], 3:[95,290], 4:[205,290]};
  const col = {0:'#e74c3c', 1:'#2980d9', 2:'#27ae60', 3:'#555555', 4:'#d4a900'};
  const arrow = (f, t, double)=>{
    const [x1,y1] = pos[f], [x2,y2] = pos[t];
    // ノードの半径ぶん縮める
    const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
    const r=34;
    const sx=x1+dx/len*r, sy=y1+dy/len*r, ex=x2-dx/len*r, ey=y2-dy/len*r;
    return `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="${col[f]}" stroke-width="4.5"
      stroke-linecap="round" marker-end="url(#ah)" ${double?'marker-start="url(#ah)"':''}/>`;
  };
  const node = i=>{
    const [x,y] = pos[i];
    return `<g>
      <circle cx="${x}" cy="${y}" r="27" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
      <text x="${x}" y="${y+7}" font-size="24" text-anchor="middle">${TYPES[i].icon}</text>
      <text x="${x}" y="${y+45}" font-size="12" text-anchor="middle" fill="#2b2b2b" font-family="inherit">${typeName(i)}</text>
    </g>`;
  };
  $('chart-svg').innerHTML = `
    <svg viewBox="0 0 300 345" style="max-width:300px; width:100%;">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#2b2b2b"/>
        </marker>
      </defs>
      ${arrow(0,2)}${arrow(2,1)}${arrow(1,0)}${arrow(3,4,true)}
      ${node(0)}${node(1)}${node(2)}${node(3)}${node(4)}
    </svg>`;
  $('chart-overlay').classList.add('show');
}
